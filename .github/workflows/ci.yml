name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lua: ${{ steps.changes.outputs.lua }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            lua:
              - 'lua/**'
              - 'plugin/**'
              - 'spec/**'
              - '*.lua'
              - '.luarc.json'
              - '*.toml'

  lua-format:
    name: Lua Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command stylua --check lua plugin spec

  lua-lint:
    name: Lua Lint Check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command selene --display-style quiet .

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        nvim: [stable, nightly]
    name: Test (Neovim ${{ matrix.nvim }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: barrettruth/canola.nvim
          ref: canola
          path: _canola

      - uses: nvim-neorocks/nvim-busted-action@v1
        with:
          nvim_version: ${{ matrix.nvim }}
